<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Page</title>
  <link rel="stylesheet" href="/src/output.css">
</head>
<body class="bg-gray-100 min-h-screen font-family">

  <!-- Navigation -->
  <nav class="bg-gray-100 text-purple-600 shadow p-4 sticky top-0 z-50">
    <div class="container mx-auto">
      <div class="flex justify-between items-center">
        <div class="text-xl font-bold">GenZ Store</div>
        <div class="space-x-4">
          <a href="../home.html" class="hover:text-pink-600">Home</a>
          <a href="../page/product.html" class="hover:text-pink-600">Products</a>
          <a href="../page/about.html" class="hover:text-pink-600">About</a>
          <a href="../page/contact.html" class="hover:text-pink-600">Contact</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto p-5 px-6 py-8">

    <!-- Page title -->
    <h1 class="text-2xl font-medium text-gray-900 mb-6">Payment</h1>
    <!-- Main grid -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

      <!-- Left: Payment form -->
      <div class="lg:col-span-2 space-y-5">

        <!-- Payment method card -->
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-base font-medium text-gray-900 mb-4 pb-3 border-b border-gray-100 flex items-center gap-2">
            <svg class="w-4 h-4 text-[#7B00D4]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
            Payment method
          </h2>

          <!-- Tabs -->
          <div class="flex gap-2 mb-5" id="payment-tabs">
            <button onclick="switchTab('card')" id="tab-card"
              class="flex-1 flex items-center justify-center gap-2 py-2.5 px-3 border border-[#7B00D4] bg-[#f5efff] text-[#7B00D4] text-sm font-medium rounded-lg transition-all">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
              Credit card
            </button>
            
          
          </div>

          <!-- Panel: Credit card -->
          <div id="panel-card">
            <div class="mb-3">
              <label class="block text-xs text-gray-500 mb-1">Cardholder name</label>
              <input type="text" placeholder="John Doe" class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-900 focus:outline-none focus:border-[#7B00D4] focus:ring-2 focus:ring-[#7B00D4]/20" />
            </div>

            <div class="mb-3">
              <label class="block text-xs text-gray-500 mb-1">Card number</label>
              <div class="relative">
                <input type="text" placeholder="1234  5678  9012  3456" maxlength="19" id="cardnum" oninput="formatCard(this)"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2.5 pr-20 text-sm text-gray-900 focus:outline-none focus:border-[#7B00D4] focus:ring-2 focus:ring-[#7B00D4]/20" />
                <div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-1">
                  <span class="text-[9px] font-bold bg-[#1a1f71] text-white px-1.5 py-0.5 rounded">VISA</span>
                  <span class="text-[9px] font-bold bg-red-600 text-white px-1.5 py-0.5 rounded">MC</span>
                </div>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-4">
              <div>
                <label class="block text-xs text-gray-500 mb-1">Expiry date</label>
                <input type="text" placeholder="MM / YY" maxlength="7" id="expiry" oninput="formatExpiry(this)"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-900 focus:outline-none focus:border-[#7B00D4] focus:ring-2 focus:ring-[#7B00D4]/20" />
              </div>
              <div>
                <label class="block text-xs text-gray-500 mb-1">CVV</label>
                <input type="text" placeholder="•••" maxlength="4"
                  class="w-full border border-gray-300 rounded-lg px-3 py-2.5 text-sm text-gray-900 focus:outline-none focus:border-[#7B00D4] focus:ring-2 focus:ring-[#7B00D4]/20" />
              </div>
            </div>

            <label class="flex items-center gap-2 text-sm text-gray-500 cursor-pointer mb-4">
              <input type="checkbox" checked class="accent-[#7B00D4] w-4 h-4" />
              Save card for future purchases
            </label>

            <button class="w-full bg-[#7B00D4] hover:bg-[#6500b0] text-white font-medium py-3.5 rounded-lg flex items-center justify-center gap-2 transition-colors text-sm">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              Pay $60.45
            </button>
          </div>
        </div>

        <!-- Shipping address summary -->
        <div class="bg-white rounded-xl border border-gray-200 p-4 flex items-center gap-3">
          <div class="w-9 h-9 rounded-full bg-[#f5efff] flex items-center justify-center flex-shrink-0">
            <svg class="w-4 h-4 text-[#7B00D4]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </div>
          <div class="flex-1">
            <p class="text-sm font-medium text-gray-900">Delivery to</p>
            <p class="text-xs text-gray-500">Sok Pisey · 123 Main St, Toul Kork, Phnom Penh </p>
          </div>
          <a href="checkout.html" class="text-sm text-[#7B00D4] hover:underline font-medium">Edit</a>
        </div>
      </div>

      <!-- order summary -->
      <div class="space-y-4">
        <div class="bg-white rounded-xl border border-gray-200 p-5">
          <h2 class="text-base font-medium text-gray-900 mb-4 pb-3 border-b border-gray-100 flex items-center gap-2">
            <svg class="w-4 h-4 text-[#7B00D4]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
            Order total
          </h2>

          <div class="space-y-2.5 mb-4">
            <div class="flex justify-between items-center text-sm">
              <span class="text-gray-700">Classic T-Shirt <span class="text-gray-400 text-xs">×1</span></span>
              <span class="font-medium text-gray-900">$19.99</span>
            </div>
            <div class="flex justify-between items-center text-sm">
              <span class="text-gray-700">Classic White Tee <span class="text-gray-400 text-xs">×1</span></span>
              <span class="font-medium text-gray-900">$18.99</span>
            </div>
            <div class="flex justify-between items-center text-sm">
              <span class="text-gray-700">Oversized Sky Blue Tee <span class="text-gray-400 text-xs">×1</span></span>
              <span class="font-medium text-gray-900">$16.99</span>
            </div>
          </div>

          <div class="border-t border-gray-100 pt-3 space-y-2">
            <div class="flex justify-between text-sm text-gray-500">
              <span>Subtotal</span><span>$55.97</span>
            </div>
            <div class="flex justify-between text-sm text-gray-500">
              <span>Delivery</span><span class="text-green-600 font-medium">Free</span>
            </div>
            <div class="flex justify-between font-medium text-gray-900 pt-2 border-t border-gray-100 text-base">
              <span>Total</span>
              <span class="text-[#7B00D4] text-lg">$55.97</span>
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
